# NemoClaw on Kubernetes
# Uses official installer with Docker-in-Docker for sandbox isolation.
---
apiVersion: v1
kind: Namespace
metadata:
  name: nemoclaw
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw-config
  namespace: nemoclaw
data:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "unix:///var/run/docker.sock"
  # Ollama service endpoint (raw host:port for socat) - UPDATE THIS FOR YOUR CLUSTER
  OLLAMA_SERVICE: "ollama.ollama-system.svc.cluster.local:11434"
  # NemoClaw config (uses host.openshell.internal:11434 via socat)
  NEMOCLAW_NON_INTERACTIVE: "1"
  NEMOCLAW_PROVIDER: "ollama"
  NEMOCLAW_MODEL: "qwen2.5:14b"
  NEMOCLAW_SANDBOX_NAME: "my-assistant"
  NEMOCLAW_POLICY_MODE: "skip"
  NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app: nemoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemoclaw
  template:
    metadata:
      labels:
        app: nemoclaw
    spec:
      initContainers:
        # Configure Docker daemon for cgroup v2 compatibility
        - name: init-docker-config
          image: busybox
          command: ["sh", "-c", "echo '{\"default-cgroupns-mode\":\"host\"}' > /etc/docker/daemon.json"]
          volumeMounts:
            - name: docker-config
              mountPath: /etc/docker

      containers:
        # Docker daemon (DinD)
        - name: dind
          image: docker:24-dind
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: nemoclaw-config
          command:
            - sh
            - -c
            - |
              apk add --no-cache socat

              # Get the pod's own IP — this is a LOCAL address in DinD's network namespace.
              # Any container on ANY Docker bridge can route to it without NAT or cross-bridge
              # forwarding (DinD kernel delivers it as local, bypassing DOCKER-ISOLATION rules).
              POD_IP=$(ip addr show eth0 | grep 'inet ' | awk '{print $2}' | cut -d/ -f1)
              echo "Pod IP: ${POD_IP}"

              # Overwrite daemon.json: cgroup v2 + pod IP as DNS (works for ALL Docker networks)
              echo "{\"default-cgroupns-mode\":\"host\",\"dns\":[\"${POD_IP}\"]}" > /etc/docker/daemon.json

              # Get K8s CoreDNS from pod resolv.conf (reachable from DinD's own network namespace)
              NAMESERVER=$(grep nameserver /etc/resolv.conf | head -1 | awk '{print $2}')
              echo "DNS upstream: ${NAMESERVER}"

              # Allow DNS reply packets through Docker's FORWARD chain (both directions)
              iptables -I FORWARD -p udp --dport 53 -j ACCEPT 2>/dev/null || true
              iptables -I FORWARD -p udp --sport 53 -j ACCEPT 2>/dev/null || true

              # Start DNS proxy before dockerd — listens on all interfaces including pod eth0
              socat UDP4-LISTEN:53,reuseaddr,fork UDP4:${NAMESERVER}:53 &

              exec dockerd --host=unix:///var/run/docker.sock
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: docker-socket
              mountPath: /var/run
            - name: docker-config
              mountPath: /etc/docker
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"

        # Workspace - runs official NemoClaw installer
        - name: workspace
          image: node:22
          command:
            - bash
            - -c
            - |
              set -e

              # Install packages
              echo "[1/5] Installing packages..."
              apt-get update -qq
              apt-get install -y -qq docker.io socat curl >/dev/null 2>&1

              # Start socat proxy: forwards host.openshell.internal:11434 -> Ollama K8s service
              echo "[2/5] Starting Ollama socat proxy..."
              socat TCP-LISTEN:11434,bind=127.0.0.1,fork,reuseaddr TCP:$OLLAMA_SERVICE &
              echo "127.0.0.1 host.openshell.internal" >> /etc/hosts
              sleep 1

              # Pre-pull the model into Ollama before the installer validates it
              echo "[3/5] Pre-pulling model ${NEMOCLAW_MODEL} into Ollama (this may take a while)..."
              curl -sf -X POST http://$OLLAMA_SERVICE/api/pull \
                -H "Content-Type: application/json" \
                -d "{\"model\":\"${NEMOCLAW_MODEL}\",\"stream\":false}" \
                | tail -c 200
              echo ""
              echo "Model pull complete."

              # Wait for Docker
              echo "[4/5] Waiting for Docker daemon..."
              for i in $(seq 1 30); do
                if docker info >/dev/null 2>&1; then break; fi
                sleep 2
              done
              docker info >/dev/null 2>&1 || { echo "Docker not ready"; exit 1; }
              echo "Docker ready"

              # Run official NemoClaw installer
              echo "[5/5] Running NemoClaw installer..."
              curl -fsSL https://nvidia.com/nemoclaw.sh | bash

              # Keep running after onboard
              echo "Onboard complete. Container staying alive."
              exec sleep infinity
          envFrom:
            - configMapRef:
                name: nemoclaw-config
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-config
              mountPath: /etc/docker
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"

      volumes:
        - name: docker-storage
          emptyDir: {}
        - name: docker-socket
          emptyDir: {}
        - name: docker-config
          emptyDir: {}
